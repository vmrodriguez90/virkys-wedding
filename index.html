<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="las virckys — nos casamos. 29 de mayo de 2027. madrid." />
  <title>las virckys</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- The tall track supplies the scroll distance; the stage stays pinned. -->
  <div class="scroll-track" id="scrollTrack">
    <div class="stage" id="stage">

      <!-- Layer 1: black intro — wordmark -->
      <div class="layer layer--intro" id="layerIntro">
        <p class="wordmark wordmark--center" id="introWordmark">las virckys</p>
      </div>

      <!-- Layer 2: the centered white square. It is the visible intro mark and
           scales up (horizontally then vertically) into the white panel. -->
      <span class="wipe" id="wipe" aria-hidden="true"></span>

      <!-- Layer 3: white text scene -->
      <div class="layer layer--text" id="layerText">
        <p class="wordmark wordmark--corner">las virckys</p>
        <span class="corner-dot" aria-hidden="true"></span>
        <p class="headline">
          nos casamos. 29 de mayo de 2027. madrid. aquí. acá. ustedes y
          nosotras. por ahora, es lo único que tenés que saber.
        </p>
      </div>

      <!-- Floating photos: drift up in front of the pinned text scene.
           data-start/end = window within the photos scroll-phase (0..1);
           data-speed = parallax depth. left/width set inline per photo. -->
      <div class="photos" id="photos" aria-hidden="true">
        <img class="photo" src="images/foto-1.jpg" alt="" loading="lazy" decoding="async"
             style="left:14%; width:56vw" data-start="0.00" data-end="0.30" data-speed="1.00" />
        <img class="photo" src="images/foto-2.jpg" alt="" loading="lazy" decoding="async"
             style="left:44%; width:44vw" data-start="0.115" data-end="0.42" data-speed="0.88" />
        <img class="photo" src="images/foto-3.jpg" alt="" loading="lazy" decoding="async"
             style="left:10%; width:60vw" data-start="0.23" data-end="0.54" data-speed="1.10" />
        <img class="photo" src="images/foto-4.jpg" alt="" loading="lazy" decoding="async"
             style="left:42%; width:46vw" data-start="0.345" data-end="0.66" data-speed="0.92" />
        <img class="photo" src="images/foto-5.jpg" alt="" loading="lazy" decoding="async"
             style="left:16%; width:54vw" data-start="0.46" data-end="0.78" data-speed="1.05" />
        <img class="photo" src="images/foto-6.jpg" alt="" loading="lazy" decoding="async"
             style="left:40%; width:48vw" data-start="0.575" data-end="0.90" data-speed="0.90" />
        <img class="photo" src="images/foto-7.jpg" alt="" loading="lazy" decoding="async"
             style="left:12%; width:58vw" data-start="0.69" data-end="1.00" data-speed="1.08" />
        <img class="photo" src="images/foto-8.jpg" alt="" loading="lazy" decoding="async"
             style="left:46%; width:42vw" data-start="0.80" data-end="1.00" data-speed="0.96" />
      </div>

      <!-- Layer 4: the top-right dark square scaled up = colour flood -->
      <span class="flood" id="flood" aria-hidden="true"></span>

      <!-- Layer 5: the RSVP form -->
      <div class="layer layer--form" id="layerForm">
        <p class="wordmark wordmark--corner wordmark--light">las virckys</p>
        <span class="corner-dot corner-dot--light" aria-hidden="true"></span>

        <form class="rsvp" id="rsvpForm" novalidate>
          <h1 class="form-heading">
            sí, soy muy<br />ansioso<br />y quiero confirmar<br />ahora-ahora-ahora
          </h1>

          <div class="toggle" role="group" aria-label="¿De dónde venís?">
            <button type="button" class="toggle-btn" data-theme="coral" id="btnAqui">
              <span class="check" aria-hidden="true">✓</span>de aquí
            </button>
            <button type="button" class="toggle-btn" data-theme="blue" id="btnAca">
              <span class="check" aria-hidden="true">✓</span>de acá
            </button>
          </div>

          <label class="field">
            <span class="sr-only">Nombre</span>
            <input type="text" name="nombre" placeholder="Nombre" autocomplete="off" />
          </label>
          <label class="field">
            <span class="sr-only">Correo</span>
            <input type="email" name="correo" placeholder="Correo" autocomplete="off" />
          </label>
          <label class="field">
            <span class="sr-only">Decinos algo bonito</span>
            <input type="text" name="mensaje" placeholder="Decinos algo bonito" autocomplete="off" />
          </label>

          <button type="submit" class="ok-btn">OK</button>
        </form>

        <div class="thanks" id="thanks" hidden>
          <p class="thanks-text" id="thanksText"></p>
        </div>
      </div>

    </div>
  </div>

  <!-- Hint to encourage the first scroll -->
  <div class="scroll-hint" id="scrollHint" aria-hidden="true">scroll</div>

  <script src="script.js"></script>
</body>
</html>
